env:
  max_steps: 200
  seed: 42
  render_mode: null

task:
  name: task_spam
  bot_ratio: 0.30
  noise_level: 0.15
  action_space: [0, 1, 2, 3]   # allow, warn, reduce_reach, remove — no escalate

graph:
  num_nodes: 500
  bot_cluster_size: 80
  intra_cluster_density: 0.4
  inter_cluster_density: 0.05
  embedding_dim: 64

reward:
  alpha: 1.0
  beta: 0.8
  gamma: 1.2
  delta: 0.3
  epsilon: 0.1
  speed_max_hops: 20

training:
  total_timesteps: 500000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  eval_freq: 10000
  n_eval_episodes: 20
