env:
  max_steps: 500
  seed: 42
  render_mode: null

task:
  name: task_cib
  bot_ratio: 0.16   # 80/500 nodes
  noise_level: 0.25
  action_space: [0, 1, 2, 3, 4]
  collateral_damage_threshold: 10   # max real nodes removable before episode ends

graph:
  num_nodes: 500
  bot_cluster_size: 80
  intra_cluster_density: 0.4
  inter_cluster_density: 0.05
  embedding_dim: 64

reward:
  alpha: 1.0
  beta: 0.8
  gamma: 1.5    # heavier collateral damage penalty for graph-level task
  delta: 0.2
  epsilon: 0.1
  speed_max_hops: 20

training:
  total_timesteps: 1000000
  learning_rate: 0.0002
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  eval_freq: 20000
  n_eval_episodes: 20
